name: "[Sync] Update instance-info"
on:
  workflow_dispatch:
  schedule:
    # once a day
    - cron: "0 0 * * *"
permissions:
  id-token: write
  contents: write
  pull-requests: write
jobs:
  update-max-pods:
    # this workflow will always fail in forks; bail if this isn't running in the upstream
    if: github.repository == 'awslabs/amazon-eks-ami'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # 6.1.1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_SYNC_ENI_MAX_PODS }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
        with:
          repository: awslabs/amazon-eks-ami
          ref: refs/heads/main
          path: amazon-eks-ami/
      - run: |
          #!/usr/bin/env bash
          set -o errexit
          cd amazon-eks-ami/nodeadm
          make generate-instance-info
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        with:
          branch: update-instance-info
          path: amazon-eks-ami/
          base: main
          add-paths: |
            nodeadm/internal/kubelet/instance-info.jsonl
          commit-message: "chore: update instance-info.jsonl"
          committer: "GitHub <noreply@github.com>"
          author: "GitHub <noreply@github.com>"
          labels: |
            changelog/exclude
          title: "chore: update instance-info.jsonl"
          body: |
            Generated by
            ```
            cd amazon-eks-ami/nodeadm
            make generate-instance-info
            ```
