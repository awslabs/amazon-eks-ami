name: "Default CI"
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
permissions:
  contents: read

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
    - run: make lint-docs
  lint-code:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
    - run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
    - run: make lint-code
