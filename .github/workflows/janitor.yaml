name: "Janitor"
on:
  workflow_dispatch:
  schedule:
    # hourly at the top of the hour
    - cron: "0 * * * *"
permissions:
  id-token: write
  contents: read
jobs:
  kubetest2-sweeper:
    # disable in forks
    if: github.repository == 'awslabs/amazon-eks-ami'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # 6.2.2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_JANITOR }}
      - uses: ./.github/actions/janitor/kubetest2-sweeper
        with:
          max_resource_age_duration: 3h
  ami-sweeper:
    # disable in forks
    if: github.repository == 'awslabs/amazon-eks-ami'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # 6.2.2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_JANITOR }}
      - uses: ./.github/actions/janitor/ami-sweeper
        with:
          # 3 days
          max_age_seconds: 259200
